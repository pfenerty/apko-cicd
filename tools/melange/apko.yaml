include: base/apko.yaml

contents:
    packages:
        - melange
        # bubblewrap is melange's default build sandbox runner; bundle it so the
        # image can build packages in CI without an extra apk install.
        - bubblewrap

annotations:
    org.opencontainers.image.title: Melange
    org.opencontainers.image.description: APK package builder for Wolfi and Alpine
    org.opencontainers.image.version: 0.56.3
    org.opencontainers.image.base.name: ghcr.io/pfenerty/apko-cicd/base:stable
