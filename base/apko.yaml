contents:
    keyring:
        - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    repositories:
        - https://packages.wolfi.dev/os
    packages:
        - wolfi-base
        - ca-certificates-bundle
        - nushell
        - git
        - curl
        - openssl
        - zstd

accounts:
    groups:
        - groupname: nonroot
          gid: 1001
    users:
        - username: nonroot
          uid: 1001
          gid: 1001
          shell: /usr/bin/nu
    run-as: nonroot

entrypoint:
    command: /usr/bin/nu -l

archs:
    - amd64
    - arm64

annotations:
    org.opencontainers.image.source: https://github.com/pfenerty/apko-cicd
    org.opencontainers.image.url: https://github.com/pfenerty/apko-cicd
    org.opencontainers.image.documentation: https://github.com/pfenerty/apko-cicd/README.md
    org.opencontainers.image.vendor: pfenerty
    org.opencontainers.image.authors: Patrick Fenerty - patrick@fenerty.me
    org.opencontainers.image.licenses: Apache-2.0
    org.opencontainers.image.title: Base CI/CD Image
    org.opencontainers.image.description: Wolfi-based base image for CI/CD pipelines
