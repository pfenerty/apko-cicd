name: Publish images

on:
  push:
    branches: [main]
    paths:
      - "**/*.lock.json"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.detect.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed images
        id: detect
        run: |
          targets=()
          while IFS= read -r lockfile; do
            [ -z "$lockfile" ] && continue
            yaml="${lockfile%.lock.json}.yaml"
            target=$(grep -F ",$yaml," Makefile | grep -oP "call IMAGE,\K[^,]+" || true)
            [ -n "$target" ] && targets+=("publish-$target")
          done < <(git diff --name-only HEAD~1 HEAD | grep '\.lock\.json$')

          json=$(printf '%s\n' "${targets[@]}" | jq -Rsc 'split("\n") | map(select(. != ""))')
          echo "targets=$json" >> "$GITHUB_OUTPUT"
          echo "Targets to publish: $json"

  publish:
    needs: detect
    if: needs.detect.outputs.targets != '[]' && needs.detect.outputs.targets != ''
    strategy:
      matrix:
        target: ${{ fromJson(needs.detect.outputs.targets) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install apko
        env:
          APKO_VERSION: "v1.1.16"
        run: |
          curl -sL "https://github.com/chainguard-dev/apko/releases/download/${APKO_VERSION}/apko_${APKO_VERSION#v}_linux_amd64.tar.gz" \
            | tar xz apko
          sudo mv apko /usr/local/bin/apko

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ matrix.target }}
        run: make ${{ matrix.target }}
