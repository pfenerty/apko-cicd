apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-path-changed: "[base/**, tools/**, languages/**]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
    pipelinesascode.tekton.dev/task: "[.tekton/tasks/git-clone.k8s.yaml, .tekton/tasks/detect-changed-images.k8s.yaml, .tekton/tasks/build-publish-image.k8s.yaml]"
  name: apko-cicd-push
spec:
  params:
    - name: project-name
      value: "{{ repo_name }}"
    - name: repo-full-name
      value: "{{ repo_owner }}/{{ repo_name }}"
    - name: source-branch
      value: "{{ source_branch }}"
    - name: url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: project-name
        type: string
      - name: repo-full-name
        type: string
      - name: source-branch
        type: string
      - name: url
        type: string
      - name: revision
        type: string
    tasks:
      - name: git-clone
        params:
          - name: url
            value: $(params.url)
          - name: revision
            value: $(params.revision)
        taskRef:
          kind: Task
          name: apko-cicd-git-clone
        workspaces:
          - name: workspace
            workspace: workspace
      - name: detect-changed-images
        runAfter:
          - git-clone
        taskRef:
          kind: Task
          name: apko-cicd-detect-changed-images
        workspaces:
          - name: workspace
            workspace: workspace
      - matrix:
          params:
            - name: unit
              value: $(tasks.detect-changed-images.results.units[*])
        name: build-publish-image
        runAfter:
          - detect-changed-images
        taskRef:
          kind: Task
          name: apko-cicd-build-publish-image
        workspaces:
          - name: workspace
            workspace: workspace
    workspaces:
      - name: workspace
  taskRunTemplate:
    podTemplate:
      securityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
    serviceAccountName: default
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
          storageClassName: local-path
