apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-publish-changed-images
  namespace: apko-cicd-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  results:
    - description: Published images (image@digest), recorded as Tekton Chains subjects
      name: IMAGES
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: 150m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: detect
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        # Decide which images to (re)publish this push. An image (any Makefile IMAGE
        # entry) is selected when its apko config, its lock file, or a sibling
        # melange.yaml changed in the last commit. Writes two files for later steps:
        #   to-build.txt   — unique melange.yaml files to build first (empty ⇒ Wolfi-only)
        #   to-publish.tsv — one `config<TAB>tag<TAB>lockfile-or-empty` row per image
        # $(workspaces.workspace.path) is a Tekton variable substituted before nu runs.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let changed = (git diff --name-only HEAD~1 HEAD | lines)

        # All images declared by the Makefile IMAGE macro.
        let images = (
          open --raw Makefile
          | lines
          | each {|l| $l | parse --regex 'call IMAGE,(?P<target>[^,]+),(?P<config>[^,]+),(?P<tag>[^)]+)'}
          | flatten
        )

        mut to_publish = []
        mut to_build = []
        for img in $images {
          let config = $img.config
          let lock = ($config | str replace --regex '\.yaml$' '.lock.json')
          let melange = $"($config | path dirname)/melange.yaml"
          # config / lock / melange are the trigger files; ones that don't exist can never
          # appear in the diff, so membership is enough (no existence check needed here).
          if ([$config, $lock, $melange] | any {|t| $t in $changed}) {
            let is_melange = ($melange | path exists)
            # Melange-built images are published from the freshly-built local repo with no
            # lockfile (a rebuilt apk would not match a pinned hash); Wolfi images use
            # their committed lockfile when present.
            let lock_field = (if $is_melange { "" } else if ($lock | path exists) { $lock } else { "" })
            $to_publish = ($to_publish | append $"($config)\t($img.tag)\t($lock_field)")
            if $is_melange { $to_build = ($to_build | append $melange) }
          }
        }

        ($to_build | uniq | str join (char nl)) | save -f to-build.txt
        ($to_publish | str join (char nl)) | save -f to-publish.tsv
        log $"($to_publish | length) image\(s\) to publish; ($to_build | uniq | length) melange package\(s\) to build."
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
    - image: ghcr.io/pfenerty/apko-cicd/melange:0.54.0
      name: build-melange
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        # Build each melange package selected by the detect step into ./packages, so the
        # apko configs that consume it via the @local repo can be published. This is the
        # only privileged step — melange's bubblewrap runner needs bwrap + root. It is a
        # no-op for Wolfi-only pushes. $(workspaces.workspace.path) is a Tekton variable.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let to_build = (open to-build.txt | lines | where {|l| ($l | str trim) | is-not-empty})
        if ($to_build | is-empty) {
          log "No melange packages to build."
          return
        }

        # This step runs on the melange image, so `melange` is already on PATH. Ensure
        # bwrap is present for melange's bubblewrap runner (a no-op once the image ships
        # it); this step runs as root so apk works.
        ^apk add --no-cache bubblewrap

        # One ephemeral signing key for every build; apko reads the pubkey in the same run,
        # so nothing is persisted. Only amd64 is built (no cross-arch emulation available).
        if not ("local-melange.rsa" | path exists) {
          ^melange keygen local-melange.rsa
        }

        for m in $to_build {
          log $"[melange] building ($m)"
          let out = (^melange build $m --arch amd64 --signing-key local-melange.rsa --out-dir packages | complete)
          print $out.stderr
          if $out.exit_code != 0 {
            error make {msg: $"melange build failed for ($m)"}
          }
        }
        log $"Built ($to_build | length) melange package\(s\)."
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
      securityContext:
        allowPrivilegeEscalation: true
        privileged: true
        runAsNonRoot: false
        runAsUser: 0
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/apko:1.2.25
      name: publish
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        # Publish each image selected by the detect step (to-publish.tsv). Wolfi images
        # use their committed lockfile; melange-built images have an empty lock field and
        # are published from the local @local repo built by the build-melange step.
        # Records each image@digest for Tekton Chains. $(workspaces.workspace.path) and
        # $(results.IMAGES.path) are Tekton variables substituted before nu runs.

        git config --global --add safe.directory $(workspaces.workspace.path)

        # This step runs on the apko image, so `apko` is already on PATH.
        let rows = (open to-publish.tsv | lines | where {|l| ($l | str trim) | is-not-empty})
        if ($rows | is-empty) {
          log "Nothing to publish."
          "" | save -f $(results.IMAGES.path)
          return
        }

        mkdir dist
        mut published = []
        for row in $rows {
          let parts = ($row | split row "\t")
          let config = $parts.0
          let tag = $parts.1
          let lock = ($parts | get 2? | default "")
          let image = $"ghcr.io/pfenerty/apko-cicd/($tag)"

          let args = (
            if ($lock | is-empty) {
              ["publish" "--sbom-path" "dist" $config $image]
            } else {
              ["publish" "--sbom-path" "dist" "--lockfile" $lock $config $image]
            }
          )
          log $"[publish] ($config) → ($image)"
          let out = (^apko ...$args | complete)
          print $out.stderr
          if $out.exit_code != 0 {
            error make {msg: $"apko publish failed for ($config)"}
          }

          # apko prints the published digest reference (image@sha256:...) on stdout.
          let digest_lines = ($out.stdout | lines | where {|l| $l =~ '@sha256:'})
          let digest_ref = (if ($digest_lines | is-empty) { $image } else { $digest_lines | last | str trim })
          $published = ($published | append $digest_ref)
        }

        # Tekton Chains build subjects: newline-separated image@digest list.
        $published | str join (char nl) | save -f $(results.IMAGES.path)
        log $"Published ($published | length) image\(s\)."
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [publish-changed-images]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "publish-changed-images", description: $desc }

        log $"report-status [publish-changed-images]: POST ($url)"
        log $"report-status [publish-changed-images]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [publish-changed-images]: done"
        } catch { |e|
          log $"report-status [publish-changed-images]: error: ($e.msg)"
        }
        exit $exit_code
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
