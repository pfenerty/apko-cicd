apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-publish-changed-images
  namespace: apko-cicd-ci
spec:
  params:
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: publish
      script: |-
        #!/bin/sh
        set -e

        # Download apko binary matching the version this repo publishes.
        # base:stable runs as nonroot (uid 1001) so apk add is unavailable;
        # download to workspace which is writable via fsGroup 1001.
        APKO_VERSION=$(grep 'image.version' tools/apko/apko.yaml | awk '{print $NF}' | tr -d '[:space:]')
        echo "Fetching apko ${APKO_VERSION}"
        TMPDIR=$(mktemp -d)
        APKO_URL="https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz"
        curl -fsSL "${APKO_URL}" | tar xz -C "${TMPDIR}"
        mv "${TMPDIR}"/apko_*/apko "$(workspaces.workspace.path)/apko"
        chmod +x "$(workspaces.workspace.path)/apko"
        rm -rf "${TMPDIR}"

        cat > /tmp/publish.nu << 'NUSHELL'
        git config --global --add safe.directory $(workspaces.workspace.path)

        let apko = $"$(workspaces.workspace.path)/apko"

        let changed = (
          git diff --name-only HEAD~1 HEAD
          | lines
          | where { |f| $f | str ends-with ".lock.json" }
        )

        if ($changed | is-empty) {
          print "No lock files changed â€” nothing to publish."
          exit 0
        }

        mkdir dist

        for lockfile in $changed {
          let yaml = ($lockfile | str replace --regex '\.lock\.json$' '.yaml')

          let matches = (
            open --raw Makefile
            | lines
            | where { |l| $l | str contains $",($yaml)," }
          )
          if ($matches | is-empty) {
            print $"[skip] no IMAGE macro for ($yaml)"
            continue
          }

          let tag = (
            $matches.0
            | parse --regex 'call IMAGE,[^,]+,[^,]+,(?P<tag>[^)]+)'
            | get tag.0
          )

          print $"[publish] ($yaml) â†’ ghcr.io/pfenerty/apko-cicd/($tag)"
          ^$apko publish --sbom-path dist --lockfile $lockfile $yaml $"ghcr.io/pfenerty/apko-cicd/($tag)"
        }
        NUSHELL

        exec nu /tmp/publish.nu
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
