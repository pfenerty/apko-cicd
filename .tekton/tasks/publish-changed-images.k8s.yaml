apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-publish-changed-images
  namespace: apko-cicd-ci
spec:
  params:
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "2"
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/apko:1.2.16
      name: publish
      script: |-
        #!/usr/bin/env nu

        git config --global --add safe.directory $(workspaces.workspace.path)

        let changed = (
          git diff --name-only HEAD~1 HEAD
          | lines
          | where { |f| $f | str ends-with ".lock.json" }
        )

        if ($changed | is-empty) {
          print "No lock files changed — nothing to publish."
          exit 0
        }

        mkdir dist

        for lockfile in $changed {
          let yaml = ($lockfile | str replace --regex '\.lock\.json$' '.yaml')

          let matches = (
            open --raw Makefile
            | lines
            | where { |l| $l | str contains $",($yaml)," }
          )
          if ($matches | is-empty) {
            print $"[skip] no IMAGE macro for ($yaml)"
            continue
          }

          let tag = (
            $matches.0
            | parse --regex 'call IMAGE,[^,]+,[^,]+,(?P<tag>[^)]+)'
            | get tag.0
          )

          print $"[publish] ($yaml) → ghcr.io/pfenerty/apko-cicd/($tag)"
          apko publish --sbom-path dist --lockfile $lockfile $yaml $"ghcr.io/pfenerty/apko-cicd/($tag)"
        }
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
