apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-build-publish-image
  namespace: apko-cicd-ci
spec:
  params:
    - name: unit
      type: string
  results:
    - description: Published image@digest
      name: IMAGE
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/melange:0.54.0
      name: build-melange
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Per-image cell (matrix), melange step. The unit is the apko config path. Copies
        # the repo into a cell-unique subdir (isolating packages/ and dist/ from other
        # parallel cells on the shared RWO workspace) and, if the config has a sibling
        # melange.yaml, builds its apk into ./packages. No-op for Wolfi images. This is
        # the only privileged step (bubblewrap); it hands the cell off to the nonroot
        # publish step by chowning it to uid 1001.
        # $(workspaces.workspace.path), $(params.unit), $(context.taskRun.name) are Tekton vars.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let config = "$(params.unit)"
        let melange = $"($config | path dirname)/melange.yaml"

        let cell = "$(workspaces.workspace.path)/.cell-$(context.taskRun.name)"
        ^mkdir -p $cell
        ^cp -r base tools languages Makefile $cell
        cd $cell

        if not ($melange | path exists) {
          log $"[($config)] Wolfi image — no melange build."
        } else {
          # The melange image already ships melange; ensure bwrap for its sandbox runner.
          ^apk add --no-cache bubblewrap
          ^melange keygen local-melange.rsa
          log $"[melange] building ($melange)"
          let out = (^melange build $melange --arch amd64 --signing-key local-melange.rsa --out-dir packages | complete)
          print $out.stderr
          if $out.exit_code != 0 {
            error make {msg: $"melange build failed for ($melange)"}
          }
        }

        # This step runs as root; the publish step runs as nonroot (uid 1001). Hand the
        # cell over so publish can write dist/ and read the built packages/ + key.
        ^chown -R 1001:1001 $cell
      securityContext:
        allowPrivilegeEscalation: true
        privileged: true
        runAsNonRoot: false
        runAsUser: 0
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/apko:1.2.25
      name: publish
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Per-image cell (matrix), publish step. The unit is the apko config path. Runs in
        # the cell subdir the melange step prepared, derives the image tag from the
        # Makefile IMAGE macro, and publishes with apko — using --lockfile for Wolfi
        # images and the freshly-built local @local repo for melange images. Emits the
        # image@digest for Tekton Chains. $(workspaces.workspace.path), $(params.unit),
        # $(context.taskRun.name), and $(results.IMAGE.path) are Tekton variables.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let config = "$(params.unit)"

        let cell = "$(workspaces.workspace.path)/.cell-$(context.taskRun.name)"
        cd $cell
        mkdir dist

        # Derive the image tag from the Makefile IMAGE macro that references this config.
        let tag = (
          open --raw Makefile
          | lines
          | where {|l| $l | str contains $",($config),"}
          | first
          | parse --regex 'call IMAGE,[^,]+,[^,]+,(?P<tag>[^)]+)'
          | get tag.0
        )
        let lock = ($config | str replace --regex '\.yaml$' '.lock.json')
        let melange = $"($config | path dirname)/melange.yaml"
        # Melange images publish from the local @local repo (no lockfile); Wolfi images
        # use their committed lockfile when present.
        let use_lock = ((not ($melange | path exists)) and ($lock | path exists))

        let image = $"ghcr.io/pfenerty/apko-cicd/($tag)"
        let args = (
          if $use_lock {
            ["publish" "--sbom-path" "dist" "--lockfile" $lock $config $image]
          } else {
            ["publish" "--sbom-path" "dist" $config $image]
          }
        )
        log $"[publish] ($config) → ($image)"
        let out = (^apko ...$args | complete)
        print $out.stderr
        if $out.exit_code != 0 {
          error make {msg: $"apko publish failed for ($config)"}
        }

        # apko prints the published digest reference (image@sha256:...) on stdout.
        let digest_lines = ($out.stdout | lines | where {|l| $l =~ '@sha256:'})
        let digest_ref = (if ($digest_lines | is-empty) { $image } else { $digest_lines | last | str trim })
        $digest_ref | save -f $(results.IMAGE.path)
        log $"Published ($image)."
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
