apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-build-publish-image
  namespace: apko-cicd-ci
spec:
  params:
    - name: unit
      type: string
  results:
    - description: Published image@digest
      name: IMAGE
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: 100m
        memory: 256Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/melange:0.54.0
      name: build-melange
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Per-image cell (matrix), melange step. Copies the repo into a cell-unique subdir
        # (isolating packages/ and dist/ from other parallel cells on the shared RWO
        # workspace) and, if this unit has a melange.yaml, builds its apk into ./packages.
        # No-op for Wolfi images. This is the only privileged step (bubblewrap).
        # $(workspaces.workspace.path), $(params.unit), $(context.taskRun.name) are Tekton vars.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let unit = "$(params.unit)"
        let melange = ($unit | split row "," | get 3? | default "")

        let cell = "$(workspaces.workspace.path)/.cell-$(context.taskRun.name)"
        ^mkdir -p $cell
        ^cp -r base tools languages Makefile $cell
        cd $cell

        if ($melange | is-empty) {
          log $"[($unit)] Wolfi image — no melange build."
          return
        }

        # The melange image already ships melange; ensure bwrap for its sandbox runner.
        ^apk add --no-cache bubblewrap
        ^melange keygen local-melange.rsa

        log $"[melange] building ($melange)"
        let out = (^melange build $melange --arch amd64 --signing-key local-melange.rsa --out-dir packages | complete)
        print $out.stderr
        if $out.exit_code != 0 {
          error make {msg: $"melange build failed for ($melange)"}
        }
      securityContext:
        allowPrivilegeEscalation: true
        privileged: true
        runAsNonRoot: false
        runAsUser: 0
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/apko:1.2.25
      name: publish
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Per-image cell (matrix), publish step. Runs in the cell subdir the melange step
        # prepared and publishes this unit's image with apko (--lockfile for Wolfi images;
        # from the local @local repo for melange images). Emits the image@digest for
        # Tekton Chains. $(workspaces.workspace.path), $(params.unit), $(context.taskRun.name),
        # and $(results.IMAGE.path) are Tekton variables.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let unit = "$(params.unit)"
        let f = ($unit | split row ",")
        let config = $f.0
        let tag = $f.1
        let lock = ($f | get 2? | default "")

        let cell = "$(workspaces.workspace.path)/.cell-$(context.taskRun.name)"
        cd $cell
        mkdir dist

        let image = $"ghcr.io/pfenerty/apko-cicd/($tag)"
        let args = (
          if ($lock | is-empty) {
            ["publish" "--sbom-path" "dist" $config $image]
          } else {
            ["publish" "--sbom-path" "dist" "--lockfile" $lock $config $image]
          }
        )
        log $"[publish] ($config) → ($image)"
        let out = (^apko ...$args | complete)
        print $out.stderr
        if $out.exit_code != 0 {
          error make {msg: $"apko publish failed for ($config)"}
        }

        # apko prints the published digest reference (image@sha256:...) on stdout.
        let digest_lines = ($out.stdout | lines | where {|l| $l =~ '@sha256:'})
        let digest_ref = (if ($digest_lines | is-empty) { $image } else { $digest_lines | last | str trim })
        $digest_ref | save -f $(results.IMAGE.path)
        log $"Published ($image)."
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
