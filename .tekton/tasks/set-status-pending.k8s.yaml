apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-set-status-pending
  namespace: apko-cicd-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "1"
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  steps:
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: pending-publish-changed-images
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: "pending", context: "publish-changed-images", description: "Running" }

        log $"status-pending [publish-changed-images]: POST ($url)"
        log $"status-pending [publish-changed-images]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "status-pending [publish-changed-images]: done"
        } catch { |e|
          log $"status-pending [publish-changed-images]: error: ($e.msg)"
          exit 1
        }
