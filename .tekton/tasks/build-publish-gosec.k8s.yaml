apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-build-publish-gosec
  namespace: apko-cicd-ci
spec:
  params:
    - name: repo-full-name
      type: string
    - name: revision
      type: string
  results:
    - description: Published gosec images (image@digest), recorded as Tekton Chains subjects
      name: IMAGES
      type: string
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: fetch-apko
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        set -e
        # base:stable runs as nonroot (uid 1001) so `apk add` is unavailable — download the
        # apko binary matching tools/apko/apko.yaml into the workspace (writable via fsGroup)
        # so the publish step can use it. $(workspaces.workspace.path) is a Tekton variable;
        # the $(...) command substitutions are evaluated by the shell at runtime.
        APKO_VERSION=$(grep 'image.version' tools/apko/apko.yaml | awk '{print $NF}' | tr -d '[:space:]')
        echo "Fetching apko ${APKO_VERSION}"
        TMPDIR=$(mktemp -d)
        APKO_URL="https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz"
        curl -fsSL "${APKO_URL}" | tar xz -C "${TMPDIR}"
        mv "${TMPDIR}"/apko_*/apko "$(workspaces.workspace.path)/apko"
        chmod +x "$(workspaces.workspace.path)/apko"
        rm -rf "${TMPDIR}"
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: fetch-melange
      onError: continue
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        (
        set -e
        # gosec has no Wolfi package, so it is built from source with melange and consumed
        # by the apko configs from a local repo. base:stable runs as nonroot (uid 1001) so
        # `apk add` is unavailable — download the melange binary matching tools/melange/apko.yaml
        # into the workspace (writable via fsGroup) so the build step can use it.
        # $(workspaces.workspace.path) is a Tekton variable; the $(...) command
        # substitutions are evaluated by the shell at runtime.
        MELANGE_VERSION=$(grep 'image.version' tools/melange/apko.yaml | awk '{print $NF}' | tr -d '[:space:]')
        echo "Fetching melange ${MELANGE_VERSION}"
        TMPDIR=$(mktemp -d)
        MELANGE_URL="https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz"
        curl -fsSL "${MELANGE_URL}" | tar xz -C "${TMPDIR}"
        mv "${TMPDIR}"/melange_*/melange "$(workspaces.workspace.path)/melange"
        chmod +x "$(workspaces.workspace.path)/melange"
        rm -rf "${TMPDIR}"
        )
        __tek_rc=$?
        __tek_prev=$(cat /tekton/home/.exit-code 2>/dev/null || echo 0)
        if [ "$__tek_rc" -gt "$__tek_prev" ]; then __tek_prev="$__tek_rc"; fi
        printf '%s' "$__tek_prev" > /tekton/home/.exit-code
        exit "$__tek_rc"
    - env:
        - name: DOCKER_CONFIG
          value: /tmp/docker-auth
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: build-publish
      onError: continue
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        def main [] {
        # Build the gosec apk with melange, then publish the per-Go-version gosec images
        # with apko — but only when something under tools/gosec/ changed in the last
        # commit. Records each published image@digest for Tekton Chains provenance.
        # $(workspaces.workspace.path) and $(results.IMAGES.path) are Tekton variables,
        # substituted into the script before nushell runs.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let melange = "$(workspaces.workspace.path)/melange"
        let apko = "$(workspaces.workspace.path)/apko"

        # Only rebuild/publish gosec when its config or melange recipe changed.
        let changed = (
          git diff --name-only HEAD~1 HEAD
          | lines
          | where {|f| $f | str starts-with "tools/gosec/"}
        )

        if ($changed | is-empty) {
          log "No tools/gosec/ changes — nothing to build or publish."
          return
        }

        # Fresh ephemeral signing key: apko reads the pubkey we generate here in the same
        # run, so nothing needs to be persisted or committed.
        if not ("local-melange.rsa" | path exists) {
          ^$melange keygen local-melange.rsa
        }

        log "Building gosec apk with melange"
        let build = (
          ^$melange build tools/gosec/melange.yaml
            --arch amd64,arm64
            --signing-key local-melange.rsa
            --out-dir packages
          | complete
        )
        print $build.stderr
        if $build.exit_code != 0 {
          error make {msg: "melange build failed for tools/gosec/melange.yaml"}
        }

        mkdir dist
        mut published = []
        for yaml in (glob tools/gosec/*.yaml | where {|f| ($f | path basename) != "melange.yaml"}) {
          let rel = ($yaml | str replace $"($env.PWD)/" "")

          # Find the image tag from the Makefile IMAGE macro that references this yaml.
          let matches = (
            open --raw Makefile
            | lines
            | where {|l| $l | str contains $",($rel),"}
          )
          if ($matches | is-empty) {
            log $"[skip] no IMAGE macro for ($rel)"
            continue
          }

          let tag = (
            $matches.0
            | parse --regex 'call IMAGE,[^,]+,[^,]+,(?P<tag>[^)]+)'
            | get tag.0
          )
          let image = $"ghcr.io/pfenerty/apko-cicd/($tag)"

          log $"[publish] ($rel) → ($image)"
          let out = (^$apko publish --sbom-path dist $rel $image | complete)
          print $out.stderr
          if $out.exit_code != 0 {
            error make {msg: $"apko publish failed for ($rel)"}
          }

          let digest_lines = ($out.stdout | lines | where {|l| $l =~ '@sha256:'})
          let digest_ref = (if ($digest_lines | is-empty) { $image } else { $digest_lines | last | str trim })
          $published = ($published | append $digest_ref)
        }

        # Tekton Chains build subjects: newline-separated image@digest list.
        $published | str join (char nl) | save -f $(results.IMAGES.path)
        log $"Published ($published | length) gosec image\(s\)."
        }
        let __tek_rc = (try { main; 0 } catch { |e| print $"error: ($e.msg)"; 1 })
        let __tek_prev = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 0 })
        let __tek_worst = ([$__tek_prev $__tek_rc] | math max)
        $"($__tek_worst)" | save -f /tekton/home/.exit-code
        exit $__tek_rc
      securityContext:
        privileged: true
        runAsNonRoot: false
        runAsUser: 0
      volumeMounts:
        - mountPath: /tmp/docker-auth/config.json
          name: docker-config
          readOnly: true
          subPath: .dockerconfigjson
    - env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-pipeline-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: report-status
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        let exit_code = (try { open --raw /tekton/home/.exit-code | str trim | into int } catch { 1 })
        let state = if $exit_code == 0 { "success" } else { "failure" }
        let desc = if $exit_code == 0 { "Passed" } else { "Failed" }

        log $"report-status [build-publish-gosec]: exit-code=($exit_code) state=($state)"

        let url = $"https://api.github.com/repos/$(params.repo-full-name)/statuses/$(params.revision)"
        let body = { state: $state, context: "build-publish-gosec", description: $desc }

        log $"report-status [build-publish-gosec]: POST ($url)"
        log $"report-status [build-publish-gosec]: body: ($body | to json -r)"

        try {
          http post $url $body -t application/json -H [
            Authorization $"token ($env.GITHUB_TOKEN)"
            Accept "application/vnd.github+json"
          ]
          log "report-status [build-publish-gosec]: done"
        } catch { |e|
          log $"report-status [build-publish-gosec]: error: ($e.msg)"
        }
  volumes:
    - name: docker-config
      secret:
        secretName: ghcr-docker-config
  workspaces:
    - name: workspace
