apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-update-update-packages
  namespace: apko-cicd-ci
  # NOTE: hand-authored. The current tektonic is all-in on Pipelines-as-Code and no
  # longer emits triggerless pipelines, so this daily package-update job (started by
  # .tekton/update-packages-cronjob.yaml) is maintained directly as YAML.
spec:
  stepTemplate:
    computeResources:
      limits:
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 200m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    # 1. Regenerate every Wolfi apko lock file against the latest packages. This is
    #    what surfaces new package versions. Skips melange-built images (gosec) — they
    #    have no lock file (they consume a local @local repo) — and melange recipes.
    - image: ghcr.io/pfenerty/apko-cicd/apko:1.2.25
      name: regen-lockfiles
      script: &lock-script |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        git config --global --add safe.directory $(workspaces.workspace.path)
        for yaml in ((glob "base/**/*.yaml") ++ (glob "tools/**/*.yaml") ++ (glob "languages/**/*.yaml")) {
          if (($yaml | path basename) == "melange.yaml") { continue }
          if ($"($yaml | path dirname)/melange.yaml" | path exists) { continue }
          let lock = ($yaml | str replace --regex '\.yaml$' '.lock.json')
          log $"Locking ($yaml)"
          let out = (^apko lock $yaml --output $lock | complete)
          if $out.exit_code != 0 { print $out.stderr; error make {msg: $"apko lock failed for ($yaml)"} }
        }
        log "Lock files regenerated."
    # 2. Sync Makefile tags + config annotations from the fresh locks.
    - image: cgr.dev/chainguard/python:latest-dev
      name: update-versions
      # Run as uid 1001 (the base/apko images' nonroot user) so it can write the
      # workspace files the other steps created — the python image defaults to a
      # different uid and would otherwise hit PermissionError on Makefile.
      securityContext:
        runAsUser: 1001
        runAsNonRoot: true
      script: |-
        #!/usr/bin/env python3
        import runpy
        runpy.run_path('scripts/update-versions.py', run_name='__main__')
    # 3. Re-lock AFTER annotating. update-versions.py rewrites the config's version
    #    annotation, which invalidates apko's config checksum stored in each lock — so
    #    lock again here to keep checksums consistent (else `apko publish --lockfile`
    #    fails on the push pipeline).
    - image: ghcr.io/pfenerty/apko-cicd/apko:1.2.25
      name: relock
      script: *lock-script
    # 4. If anything changed, push the branch and open an auto-merging PR.
    - env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-automerge-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: open-pr
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Push regenerated locks + version pins to update/package-versions and open a PR
        # with auto-merge enabled. Requires GH_TOKEN (repo-scoped) from github-automerge-token.

        const REPO = "pfenerty/apko-cicd"
        const BRANCH = "update/package-versions"
        const BASE = "main"

        git config --global --add safe.directory $(workspaces.workspace.path)
        git config --global user.email "ci@apko-cicd.local"
        git config --global user.name "apko-cicd CI"

        if ($env.GH_TOKEN? | is-empty) {
          error make {msg: "GH_TOKEN is not set (github-automerge-token secret missing)"}
        }

        if (git status --porcelain | lines | is-empty) {
          log "No package/version changes — nothing to propose."
          return
        }

        git checkout -B $BRANCH
        git add Makefile base tools languages
        git commit -m "chore: update package versions"

        let remote = $"https://x-access-token:($env.GH_TOKEN)@github.com/($REPO)"
        git push --force $remote $"HEAD:($BRANCH)"

        let api = $"https://api.github.com/repos/($REPO)"
        let pr_body = {
          title: "chore: update package versions",
          head: $BRANCH,
          base: $BASE,
          body: "Automated package version update: lock files regenerated with `apko lock` and version pins synced from them by the update-packages Tekton job."
        }
        let created = (
          http post --allow-errors --content-type application/json
            --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json" "X-GitHub-Api-Version" "2022-11-28"]
            $"($api)/pulls" $pr_body
        )
        let number = (
          if ($created | get number? | is-not-empty) {
            $created.number
          } else {
            let open = (http get --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json"] $"($api)/pulls?head=pfenerty:($BRANCH)&state=open")
            $open.0.number
          }
        )
        log $"PR #($number) ready"

        let node_id = (http get --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json"] $"($api)/pulls/($number)" | get node_id)
        let mutation = $"mutation { enablePullRequestAutoMerge\(input: {pullRequestId: \"($node_id)\", mergeMethod: SQUASH}\) { clientMutationId } }"
        let am = (http post --allow-errors --content-type application/json --headers [Authorization $"Bearer ($env.GH_TOKEN)"] "https://api.github.com/graphql" { query: $mutation })
        if ($am | get errors? | is-empty) {
          log $"Auto-merge enabled for PR #($number) — it will merge when required checks pass."
        } else {
          # GitHub rejects auto-merge when the PR is already mergeable (no required
          # checks to wait on), so merge it directly. Add branch protection + a
          # PR-triggered check later to gate merges on a green build instead.
          log $"Auto-merge not applicable; merging PR #($number) directly."
          http put --allow-errors --content-type application/json --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json"] $"($api)/pulls/($number)/merge" { merge_method: "squash" }
          log $"Merged PR #($number)."
        }
  workspaces:
    - name: workspace
