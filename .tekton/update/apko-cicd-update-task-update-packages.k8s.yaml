apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: apko-cicd-update-update-packages
  namespace: apko-cicd-ci
spec:
  stepTemplate:
    computeResources:
      limits:
        cpu: "4"
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 512Mi
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    workingDir: $(workspaces.workspace.path)
  steps:
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: fetch-apko
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        set -e
        # base:stable runs as nonroot (uid 1001) so `apk add` is unavailable — download the
        # apko binary matching tools/apko/apko.yaml into the workspace (writable via fsGroup)
        # so the publish step can use it. $(workspaces.workspace.path) is a Tekton variable;
        # the $(...) command substitutions are evaluated by the shell at runtime.
        APKO_VERSION=$(grep 'image.version' tools/apko/apko.yaml | awk '{print $NF}' | tr -d '[:space:]')
        echo "Fetching apko ${APKO_VERSION}"
        TMPDIR=$(mktemp -d)
        APKO_URL="https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz"
        curl -fsSL "${APKO_URL}" | tar xz -C "${TMPDIR}"
        mv "${TMPDIR}"/apko_*/apko "$(workspaces.workspace.path)/apko"
        chmod +x "$(workspaces.workspace.path)/apko"
        rm -rf "${TMPDIR}"
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: fetch-melange
      script: |-
        #!/bin/sh
        log() { printf '[%s] %s\n' "$(date +%H:%M:%S)" "$*"; }
        set -e
        # gosec has no Wolfi package, so it is built from source with melange and consumed
        # by the apko configs from a local repo. base:stable runs as nonroot (uid 1001) so
        # `apk add` is unavailable — download the melange binary matching tools/melange/apko.yaml
        # into the workspace (writable via fsGroup) so the build step can use it.
        # $(workspaces.workspace.path) is a Tekton variable; the $(...) command
        # substitutions are evaluated by the shell at runtime.
        MELANGE_VERSION=$(grep 'image.version' tools/melange/apko.yaml | awk '{print $NF}' | tr -d '[:space:]')
        echo "Fetching melange ${MELANGE_VERSION}"
        TMPDIR=$(mktemp -d)
        MELANGE_URL="https://github.com/chainguard-dev/melange/releases/download/v${MELANGE_VERSION}/melange_${MELANGE_VERSION}_linux_amd64.tar.gz"
        curl -fsSL "${MELANGE_URL}" | tar xz -C "${TMPDIR}"
        mv "${TMPDIR}"/melange_*/melange "$(workspaces.workspace.path)/melange"
        chmod +x "$(workspaces.workspace.path)/melange"
        rm -rf "${TMPDIR}"
    - image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: regen-lockfiles
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # Regenerate every apko lock file against the latest Wolfi packages. gosec has no
        # Wolfi package, so its apk is built with melange first (into ./packages) so the
        # @local gosec configs resolve during locking. $(workspaces.workspace.path) is a
        # Tekton variable substituted before nushell runs.

        git config --global --add safe.directory $(workspaces.workspace.path)

        let melange = "$(workspaces.workspace.path)/melange"
        let apko = "$(workspaces.workspace.path)/apko"

        # melange's bubblewrap runner needs bwrap, which base:stable does not ship. This
        # step runs privileged as root, so install it at runtime.
        ^apk add --no-cache bubblewrap

        # Build the gosec apk so tools/gosec/*.yaml can be locked. Ephemeral signing key.
        if not ("local-melange.rsa" | path exists) {
          ^$melange keygen local-melange.rsa
        }
        let build = (
          ^$melange build tools/gosec/melange.yaml
            --arch amd64
            --signing-key local-melange.rsa
            --out-dir packages
          | complete
        )
        print $build.stderr
        if $build.exit_code != 0 {
          error make {msg: "melange build failed for tools/gosec/melange.yaml"}
        }

        # Lock every apko config under base/, tools/, languages/. melange recipes are not
        # apko configs, so skip anything named melange.yaml.
        for yaml in (glob {base,tools,languages}/**/*.yaml) {
          if (($yaml | path basename) == "melange.yaml") { continue }
          let lock = ($yaml | str replace --regex '\.yaml$' '.lock.json')
          log $"Locking ($yaml)"
          let out = (^$apko lock $yaml --output $lock | complete)
          if $out.exit_code != 0 {
            print $out.stderr
            error make {msg: $"apko lock failed for ($yaml)"}
          }
        }
        log "Lock files regenerated."
      securityContext:
        privileged: true
        runAsNonRoot: false
        runAsUser: 0
    - image: cgr.dev/chainguard/python:latest-dev
      name: update-versions
      script: |-
        #!/usr/bin/env python3
        import sys
        from datetime import datetime as _dt
        def log(_m): print(f"[{_dt.now():%H:%M:%S}] {_m}", flush=True)
        import runpy; runpy.run_path('scripts/update-versions.py', run_name='__main__')
    - env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-automerge-token
      image: ghcr.io/pfenerty/apko-cicd/base:stable
      name: open-pr
      script: |-
        #!/usr/bin/env nu
        def log [msg: string] { print $"[(date now | format date '%H:%M:%S')] ($msg)" }
        # If the lockfile/version regen produced changes, push them to the
        # update/package-versions branch and open a pull request with auto-merge enabled,
        # so it merges automatically once the required push-pipeline checks pass.
        #
        # Requires GH_TOKEN (repo-scoped) from the github-automerge-token secret.
        # $(workspaces.workspace.path) is a Tekton variable substituted before nu runs.

        const REPO = "pfenerty/apko-cicd"
        const BRANCH = "update/package-versions"
        const BASE = "main"

        git config --global --add safe.directory $(workspaces.workspace.path)
        git config --global user.email "ci@apko-cicd.local"
        git config --global user.name "apko-cicd CI"

        # packages/ and the local key are build artifacts — never commit them.
        if ($env.GH_TOKEN? | is-empty) {
          error make {msg: "GH_TOKEN is not set (github-automerge-token secret missing)"}
        }

        let dirty = (git status --porcelain | lines | where {|l| not ($l | str contains "packages/") and not ($l | str contains "local-melange.rsa")})
        if ($dirty | is-empty) {
          log "No package/version changes — nothing to propose."
          return
        }

        # update-versions.py rewrites Makefile tags/annotations; the lock files live under
        # base/ tools/ languages/. Stage exactly those — never packages/ or the signing key.
        git checkout -B $BRANCH
        git add Makefile base tools languages
        git commit -m "chore: update package versions"

        let remote = $"https://x-access-token:($env.GH_TOKEN)@github.com/($REPO)"
        git push --force $remote $"HEAD:($BRANCH)"

        # Create the PR (ignore 422 = one already open for this head branch).
        let api = $"https://api.github.com/repos/($REPO)"
        let pr_body = {
          title: "chore: update package versions",
          head: $BRANCH,
          base: $BASE,
          body: "Automated package version update. Lock files regenerated with `apko lock` and version pins updated from them by the update-packages Tekton pipeline."
        }
        let created = (
          http post --allow-errors --content-type application/json
            --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json" "X-GitHub-Api-Version" "2022-11-28"]
            $"($api)/pulls" $pr_body
        )

        # Resolve the PR number (newly created, or the existing open one for this branch).
        let number = (
          if ($created | get number? | is-not-empty) {
            $created.number
          } else {
            let open = (
              http get
                --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json"]
                $"($api)/pulls?head=pfenerty:($BRANCH)&state=open"
            )
            $open.0.number
          }
        )
        log $"PR #($number) ready"

        # Enable auto-merge (squash) via GraphQL. The PR merges once required checks pass.
        let node_id = (
          http get
            --headers [Authorization $"Bearer ($env.GH_TOKEN)" Accept "application/vnd.github+json"]
            $"($api)/pulls/($number)"
          | get node_id
        )
        let mutation = $"mutation { enablePullRequestAutoMerge\(input: {pullRequestId: \"($node_id)\", mergeMethod: SQUASH}\) { clientMutationId } }"
        http post --allow-errors --content-type application/json
          --headers [Authorization $"Bearer ($env.GH_TOKEN)"]
          "https://api.github.com/graphql" { query: $mutation }
        log $"Auto-merge enabled for PR #($number)."
  workspaces:
    - name: workspace
