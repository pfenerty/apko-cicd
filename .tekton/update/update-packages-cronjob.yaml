# HAND-AUTHORED — not generated by `make tekton-synth` (that writes to .tekton/update/).
#
# Scheduler for the update-packages pipeline (migrated off GitHub Actions). Daily
# at 06:00 it creates a PipelineRun of the synthesized `apko-cicd-update-update-packages`
# Pipeline, which regenerates lock files, updates version pins, and opens an
# auto-merging PR.
#
# Prerequisites (out-of-band, see also the update task):
#   - the Pipeline + Tasks in .tekton/update/ are applied to the cluster (via Flux)
#   - Secret `github-automerge-token` (key `token`, scope: repo) exists in apko-cicd-ci
#   - branch protection with required checks on `main` so auto-merge waits for CI
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: update-packages-cron
  namespace: apko-cicd-ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: update-packages-cron
  namespace: apko-cicd-ci
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: update-packages-cron
  namespace: apko-cicd-ci
subjects:
  - kind: ServiceAccount
    name: update-packages-cron
    namespace: apko-cicd-ci
roleRef:
  kind: Role
  name: update-packages-cron
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: update-packages
  namespace: apko-cicd-ci
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: update-packages-cron
          restartPolicy: Never
          containers:
            - name: create-pipelinerun
              image: cgr.dev/chainguard/kubectl:latest-dev
              command: ["sh", "-c"]
              args:
                - |
                  cat <<'EOF' | kubectl create -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    generateName: update-packages-
                    namespace: apko-cicd-ci
                  spec:
                    pipelineRef:
                      name: apko-cicd-update-update-packages
                    params:
                      - name: url
                        value: https://github.com/pfenerty/apko-cicd
                      - name: revision
                        value: main
                    taskRunTemplate:
                      serviceAccountName: default
                    workspaces:
                      - name: workspace
                        volumeClaimTemplate:
                          spec:
                            accessModes: ["ReadWriteOnce"]
                            storageClassName: local-path
                            resources:
                              requests:
                                storage: 2Gi
                  EOF
